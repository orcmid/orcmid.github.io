<!-- This page is used for FrontPage "Include Page" components on pages where the Google Analytics insertion
     is desired.  This content will be inserted as a client-side script in that page (or template).  
     Editing of the insertion is not done in the pages that include the component.  
     
     Instead, the insertion is edited on this page and the changes will be automatically 
     propogated to all other pages that include this page.
-->
</head>

<body stylesrc="c000004e.htm" bgcolor="#FFFFFF" text="#000080" link="#0000FF" vlink="#800080" alink="#FF0000">
<script type="text/javascript">
var gaJsHost = (("https:" == document.location.protocol) ? "https://ssl." : "http://www.");
document.write(unescape("%3Cscript src='" + gaJsHost + "google-analytics.com/ga.js' type='text/javascript'%3E%3C/script%3E"));
</script>
<script type="text/javascript">
try {
var pageTracker = _gat._getTracker("UA-8282588-1");
pageTracker._trackPageview();
} catch(err) {}</script>
